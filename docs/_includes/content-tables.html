<div class="row">
  <div class="col-lg-4 col-xxl-3">
    <div class="bs-sidebar" id="sidebar">
      <ul class="nav bs-sidenav nav-tabs-vertical">
        {% for doc in site.tables %}
        {% if doc.category == page.category %}
        <li class="nav-item">
          <a class="nav-link" href="{{site.baseurl}}{{ page.url }}#{{ doc.anchor }}"><span>{{ doc.menutitle }}</span><span class="menusubtitle {{ doc.menusubtitleclass }}">{{ doc.menusubtitle }}</span></a>
        </li>
        {% endif %}
        {% endfor %}
      </ul>
    </div>
  </div>
  <div class="col-lg-8 col-xxl-9" role="main">
    {% for doc in site.tables %}
    {% if doc.category == page.category %}
      <div class="mb-30 pt-30" id="{{ doc.anchor }}">
        <h2 class="bg-white mb-0 pl-10 pr-10 pt-5 pb-5 d-inline-flex">{{ doc.Title }}</h2>
        {{ doc.content }}
      </div>
    {% endif %}
    {% endfor %}
  </div>
</div>
